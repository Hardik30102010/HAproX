<div>
  <input type="color" id="picker">
<p id="hexText">#000000</p>

  <script>
    function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
    function downloadText() {
      const exten = document.getElementById("exten").value;
      const proname = document.getElementById("proname").value;
      const text = document.getElementById("T").value;
      const blob = new Blob([text], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = proname + exten;
      link.click();
      URL.revokeObjectURL(url);
    }
    function copyT() {
      const el = document.getElementById("T");
      navigator.clipboard.writeText(el.value);
      alert("Code copied!");
    }
    document.querySelector(".progress").addEventListener("animationend", () => {
      showPage("home");
    });
    function changeFontSize(size) {
  
  document.getElementById("T").style.fontSize = size + "px";
}
    function runCode() {
  const html = document.getElementById("html").value;
  const css = "<style>" + document.getElementById("css").value + "</style>";
  const js = "<script>" + document.getElementById("js").value + "<\/script>";
  document.getElementById("output").srcdoc = html + css + js;
}

document.querySelectorAll("textarea").forEach(area => {
  area.addEventListener("input", runCode);
});

runCode();
  </script>
